<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HearLink PA - Combined Dual Matrix</title>
    <style>
        :root {
            --bg: #090d16;
            --card-bg: #121b2e;
            --text: #f8fafc;
            --primary: #3b82f6;
            --success: #10b981;
            --danger: #ef4444;
            --border: #1e293b;
        }
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            user-select: none;
        }
        .pa-container {
            background: var(--card-bg);
            border: 2px solid var(--border);
            border-radius: 24px;
            padding: 25px;
            width: 90%;
            max-width: 430px;
            box-sizing: border-box;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.6);
        }
        .app-title {
            font-size: 1.6rem;
            font-weight: 900;
            margin-bottom: 4px;
            color: var(--primary);
        }
        .app-subtitle {
            font-size: 0.8rem;
            color: #64748b;
            margin-bottom: 25px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .matrix-box {
            background: #090d16;
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 15px;
            margin-bottom: 25px;
            text-align: left;
        }
        .matrix-title {
            font-size: 0.85rem;
            font-weight: 800;
            color: #94a3b8;
            margin-bottom: 12px;
            text-transform: uppercase;
        }
        .radio-label {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 0.95rem;
            font-weight: 700;
            color: #e2e8f0;
            margin: 12px 0;
            cursor: pointer;
            padding: 8px;
            border-radius: 8px;
            transition: background 0.15s;
        }
        .radio-label:hover {
            background: #121b2e;
        }
        .mic-btn {
            width: 100%;
            padding: 16px;
            border-radius: 14px;
            border: none;
            background: var(--danger);
            color: white;
            font-size: 1.1rem;
            font-weight: 800;
            cursor: pointer;
            outline: none;
            transition: background 0.15s;
            margin-bottom: 20px;
        }
        .mic-btn.active {
            background: var(--success);
        }
        .slider-container {
            margin: 20px 0;
            text-align: left;
        }
        .slider-label {
            display: flex;
            justify-content: space-between;
            font-weight: 700;
            font-size: 0.9rem;
            margin-bottom: 6px;
            color: #94a3b8;
        }
        .vol-slider {
            width: 100%;
            -webkit-appearance: none;
            appearance: none;
            height: 10px;
            border-radius: 5px;
            background: #090d16;
            outline: none;
            cursor: pointer;
        }
        .vol-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: var(--primary);
            cursor: pointer;
        }
        .status-badge {
            display: inline-block;
            padding: 6px 14px;
            border-radius: 20px;
            background: #090d16;
            font-size: 0.8rem;
            font-weight: 700;
            color: #64748b;
            border: 1px solid var(--border);
        }
    </style>
</head>
<body>

    <div class="pa-container">
        <div class="app-title">पब्लिक एड्रेस सिस्टम</div>
        <div class="app-subtitle">Combined Bi-Directional PA Node</div>
        
        <div class="matrix-box">
            <div class="matrix-title">सिस्टम रूटिंग सेटअप (Setup Mode)</div>
            <label class="radio-label">
                <input type="radio" name="systemMatrixDirection" value="bt-mic-phone-spk" checked onchange="handleMatrixShift()">
                🎙️ मोड A: ब्लूटूथ माइक ➔ 🔊 फोन स्पीकर
            </label>
            <label class="radio-label">
                <input type="radio" name="systemMatrixDirection" value="phone-mic-bt-spk" onchange="handleMatrixShift()">
                🎙️ मोड B: फोन माइक ➔ 🔊 ब्लूटूथ हेडसेट
            </label>
        </div>
        
        <button id="micToggleButton" class="mic-btn" onclick="toggleCombinedPAEngine()">सिस्टम चालू करें</button>
        
        <div class="slider-container">
            <div class="slider-label">
                <span>आवाज़ नियंत्रण (Loudness Control)</span>
                <span id="volumeDisplayValue">100%</span>
            </div>
            <input type="range" id="volumeGainSlider" class="vol-slider" min="0" max="150" value="100" oninput="adjustSystemLoudness(this.value)">
        </div>
        
        <div id="statusBadgeDisplay" class="status-badge">स्थिति: बंद (Offline)</div>
    </div>

<script>
    let rawAudioContext = null;
    let microphoneStreamNode = null;
    let lowPassFilterNode = null;
    let highPassFilterNode = null;
    let dynamicCompressorNode = null;
    let volumeGainNode = null;
    let currentMediaStream = null;
    let isPAEngineRunning = false;

    async function toggleCombinedPAEngine() {
        const actionButton = document.getElementById('micToggleButton');
        const statusBadge = document.getElementById('statusBadgeDisplay');
        const selectedMode = document.querySelector('input[name="systemMatrixDirection"]:checked').value;

        if (!isPAEngineRunning) {
            try {
                // Initialize clean, raw constraints based on selected direction
                const audioConstraints = {
                    echoCancellation: true,
                    noiseSuppression: true,
                    autoGainControl: true
                };

                // Mode B optimization: Force phone internal mic explicitly if selected
                if (selectedMode === "phone-mic-bt-spk") {
                    const devices = await navigator.mediaDevices.enumerateDevices();
                    const builtInMic = devices.find(d => d.kind === 'audioinput' && (d.label.toLowerCase().includes('built-in') || d.label.toLowerCase().includes('default')));
                    if (builtInMic) {
                        audioConstraints.deviceId = { exact: builtInMic.deviceId };
                    }
                }

                currentMediaStream = await navigator.mediaDevices.getUserMedia({
                    audio: audioConstraints,
                    video: false
                });

                const AudioContextClass = window.AudioContext || window.webkitAudioContext;
                rawAudioContext = new AudioContextClass({ latencyHint: 'interactive' });

                microphoneStreamNode = rawAudioContext.createMediaStreamSource(currentMediaStream);
                highPassFilterNode = rawAudioContext.createBiquadFilter();
                lowPassFilterNode = rawAudioContext.createBiquadFilter();
                dynamicCompressorNode = rawAudioContext.createDynamicsCompressor();
                volumeGainNode = rawAudioContext.createGain();

                // Advanced Human Vocal Bandpass Tuning (350Hz - 3200Hz)
                highPassFilterNode.type = "highpass";
                highPassFilterNode.frequency.setValueAtTime(350, rawAudioContext.currentTime); // Protects tracking limits

                lowPassFilterNode.type = "lowpass";
                lowPassFilterNode.frequency.setValueAtTime(3200, rawAudioContext.currentTime); // Clamps high end screams

                // Specialized Flat-Tail Compressor Layout (Anti-Feedback Guard)
                dynamicCompressorNode.threshold.setValueAtTime(-5, rawAudioContext.currentTime);
                dynamicCompressorNode.knee.setValueAtTime(15, rawAudioContext.currentTime);
                dynamicCompressorNode.ratio.setValueAtTime(20, rawAudioContext.currentTime);
                dynamicCompressorNode.attack.setValueAtTime(0.002, rawAudioContext.currentTime); // Fast 2ms clamping
                dynamicCompressorNode.release.setValueAtTime(0.000, rawAudioContext.currentTime); // Zero release tail clipping

                const currentSliderValue = document.getElementById('volumeGainSlider').value;
                volumeGainNode.gain.setValueAtTime(currentSliderValue / 100, rawAudioContext.currentTime);

                // Build Node Connection Map
                microphoneStreamNode.connect(highPassFilterNode);
                highPassFilterNode.connect(lowPassFilterNode);
                lowPassFilterNode.connect(dynamicCompressorNode);
                dynamicCompressorNode.connect(volumeGainNode);
                volumeGainNode.connect(rawAudioContext.destination);

                // --- DYNAMIC HARDWARE TARGET ROUTING OVERRIDE ---
                if (typeof rawAudioContext.destination.setSinkId === 'function') {
                    const outputDevices = await navigator.mediaDevices.enumerateDevices();
                    let targetOutputDevice = null;

                    if (selectedMode === "bt-mic-phone-spk") {
                        // Force out through phone physical built-in channels
                        targetOutputDevice = outputDevices.find(d => 
                            d.kind === 'audiooutput' && 
                            (d.label.toLowerCase().includes('speaker') || d.label.toLowerCase().includes('built-in') || d.deviceId === 'default') &&
                            !d.label.toLowerCase().includes('bluetooth')
                        );
                    } else {
                        // Force out through connected wireless bluetooth target channels
                        targetOutputDevice = outputDevices.find(d => 
                            d.kind === 'audiooutput' && 
                            (d.label.toLowerCase().includes('bluetooth') || d.label.toLowerCase().includes('headset') || d.label.toLowerCase().includes('hands-free'))
                        );
                    }

                    if (targetOutputDevice) {
                        await rawAudioContext.destination.setSinkId(targetOutputDevice.deviceId);
                        console.log("Hardware Output Matrix Locked To: " + targetOutputDevice.label);
                    }
                }

                isPAEngineRunning = true;
                actionButton.textContent = "सिस्टम बंद करें";
                actionButton.classList.add('active');
                statusBadge.textContent = selectedMode === "bt-mic-phone-spk" ? "स्थिति: मोड A सक्रिय" : "स्थिति: मोड B सक्रिय";
                statusBadge.style.borderColor = "var(--success)";
                statusBadge.style.color = "var(--success)";

            } catch (error) {
                console.error("Matrix Routing Violation Error: ", error);
                alert("ऑडियो डिवाइस सेटअप एरर। कृपया ब्लूटूथ कनेक्शन की जांच करें।");
            }
        } else {
            shutdownCombinedPAEngine();
        }
    }

    function shutdownCombinedPAEngine() {
        const actionButton = document.getElementById('micToggleButton');
        const statusBadge = document.getElementById('statusBadgeDisplay');

        if (microphoneStreamNode) microphoneStreamNode.disconnect();
        if (highPassFilterNode) highPassFilterNode.disconnect();
        if (lowPassFilterNode) lowPassFilterNode.disconnect();
        if (dynamicCompressorNode) dynamicCompressorNode.disconnect();
        if (volumeGainNode) volumeGainNode.disconnect();
        
        if (currentMediaStream) {
            currentMediaStream.getTracks().forEach(track => track.stop());
        }
        if (rawAudioContext) {
            rawAudioContext.close();
            rawAudioContext = null;
        }

        isPAEngineRunning = false;
        actionButton.textContent = "सिस्टम चालू करें";
        actionButton.classList.remove('active');
        statusBadge.textContent = "स्थिति: बंद (Offline)";
        statusBadge.style.borderColor = "var(--border)";
        statusBadge.style.color = "#64748b";
    }

    function handleMatrixShift() {
        if (isPAEngineRunning) {
            shutdownCombinedPAEngine();
            toggleCombinedPAEngine();
        }
    }

    function adjustSystemLoudness(sliderValue) {
        document.getElementById('volumeDisplayValue').textContent = sliderValue + "%";
        if (rawAudioContext && volumeGainNode && isPAEngineRunning) {
            volumeGainNode.gain.setValueAtTime(sliderValue / 100, rawAudioContext.currentTime);
        }
    }
</script>
</body>
</html>
