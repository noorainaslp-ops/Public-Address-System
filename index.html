<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HearLink Pro PA - Anti-Feedback Engine</title>
    <style>
        :root {
            --bg: #0b0f19;
            --card-bg: #151f32;
            --text: #f8fafc;
            --primary: #10b981;
            --danger: #ef4444;
            --border: #24334d;
        }
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            user-select: none;
        }
        .pa-container {
            background: var(--card-bg);
            border: 2px solid var(--border);
            border-radius: 28px;
            padding: 30px;
            width: 90%;
            max-width: 400px;
            box-sizing: border-box;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .app-title {
            font-size: 1.6rem;
            font-weight: 900;
            margin-bottom: 5px;
            color: var(--primary);
        }
        .app-subtitle {
            font-size: 0.85rem;
            color: #64748b;
            margin-bottom: 30px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .mic-btn {
            width: 140px;
            height: 140px;
            border-radius: 50%;
            border: none;
            background: var(--danger);
            color: white;
            font-size: 1.2rem;
            font-weight: 800;
            cursor: pointer;
            outline: none;
            transition: all 0.2s ease;
            margin-bottom: 35px;
            box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.4);
        }
        .mic-btn.active {
            background: var(--primary);
            box-shadow: 0 0 0 20px rgba(16, 185, 129, 0.15);
        }
        .slider-container {
            margin: 20px 0;
            text-align: left;
        }
        .slider-label {
            display: flex;
            justify-content: space-between;
            font-weight: 700;
            font-size: 0.95rem;
            margin-bottom: 8px;
            color: #94a3b8;
        }
        .vol-slider {
            width: 100%;
            -webkit-appearance: none;
            appearance: none;
            height: 10px;
            border-radius: 5px;
            background: #0f172a;
            outline: none;
            cursor: pointer;
        }
        .vol-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 22px;
            height: 22px;
            border-radius: 50%;
            background: var(--primary);
            cursor: pointer;
        }
        .status-badge {
            display: inline-block;
            padding: 6px 16px;
            border-radius: 20px;
            background: #0b0f19;
            font-size: 0.85rem;
            font-weight: 700;
            color: #64748b;
            border: 1px solid var(--border);
            margin-top: 10px;
        }
    </style>
</head>
<body>

    <div class="pa-container">
        <div class="app-title">पब्लिक एड्रेस सिस्टम</div>
        <div class="app-subtitle">Anti-Feedback Pro Engine</div>
        
        <button id="micToggleButton" class="mic-btn" onclick="togglePublicAddressEngine()">माइक चालू</button>
        
        <div class="slider-container">
            <div class="slider-label">
                <span>आवाज़ नियंत्रण (Volume)</span>
                <span id="volumeDisplayValue">100%</span>
            </div>
            <input type="range" id="volumeGainSlider" class="vol-slider" min="0" max="150" value="100" oninput="adjustSystemLoudness(this.value)">
        </div>
        
        <div id="statusBadgeDisplay" class="status-badge">स्थिति: बंद (Offline)</div>
    </div>

<script>
    let rawAudioContext = null;
    let microphoneStreamNode = null;
    let lowPassFilterNode = null;
    let highPassFilterNode = null;
    let dynamicCompressorNode = null;
    let volumeGainNode = null;
    let isPublicAddressActive = false;

    async function togglePublicAddressEngine() {
        const actionButton = document.getElementById('micToggleButton');
        const statusBadge = document.getElementById('statusBadgeDisplay');

        if (!isPublicAddressActive) {
            try {
                // Step 1: Request hardware constraints with adaptive filters enabled
                const mediaStream = await navigator.mediaDevices.getUserMedia({
                    audio: {
                        echoCancellation: true,  // Eradicates speaker feedback loops loops
                        noiseSuppression: true,  // Strips out static background floor hiss
                        autoGainControl: true    // Prevents extreme clipping overdrive
                    },
                    video: false
                });

                const AudioContextClass = window.AudioContext || window.webkitAudioContext;
                rawAudioContext = new AudioContextClass({ latencyHint: 'interactive' });

                // Step 2: Establish the audio graph nodes
                microphoneStreamNode = rawAudioContext.createMediaStreamSource(mediaStream);
                highPassFilterNode = rawAudioContext.createBiquadFilter();
                lowPassFilterNode = rawAudioContext.createBiquadFilter();
                dynamicCompressorNode = rawAudioContext.createDynamicsCompressor();
                volumeGainNode = rawAudioContext.createGain();

                // Step 3: Configure Human Vocal Bandpass Parameters (300Hz to 3000Hz)
                highPassFilterNode.type = "highpass";
                highPassFilterNode.frequency.setValueAtTime(300, rawAudioContext.currentTime); // Cuts out room rumbles

                lowPassFilterNode.type = "lowpass";
                lowPassFilterNode.frequency.setValueAtTime(3000, rawAudioContext.currentTime); // Cuts out high-pitched screeching feedback

                // Step 4: Configure Studio Dynamics Compressor to flatten sound peaks
                dynamicCompressorNode.threshold.setValueAtTime(-24, rawAudioContext.currentTime); // Clamps spikes
                dynamicCompressorNode.knee.setValueAtTime(30, rawAudioContext.currentTime);       // Smooth transition curves
                dynamicCompressorNode.ratio.setValueAtTime(12, rawAudioContext.currentTime);      // Aggressive protection clamp
                dynamicCompressorNode.attack.setValueAtTime(0.003, rawAudioContext.currentTime);  // Fast action engagement
                dynamicCompressorNode.release.setValueAtTime(0.25, rawAudioContext.currentTime);  // Release hold metric

                // Set initial volume
                const currentSliderValue = document.getElementById('volumeGainSlider').value;
                volumeGainNode.gain.setValueAtTime(currentSliderValue / 100, rawAudioContext.currentTime);

                // Step 5: Route the anti-noise network path
                // Mic -> HighPass -> LowPass -> Compressor -> Gain -> Output
                microphoneStreamNode.connect(highPassFilterNode);
                highPassFilterNode.connect(lowPassFilterNode);
                lowPassFilterNode.connect(dynamicCompressorNode);
                dynamicCompressorNode.connect(volumeGainNode);
                volumeGainNode.connect(rawAudioContext.destination);

                isPublicAddressActive = true;
                actionButton.textContent = "माइक बंद";
                actionButton.classList.add('active');
                statusBadge.textContent = "स्थिति: लाइव (CLEAN AUDIO)";
                statusBadge.style.borderColor = "var(--primary)";
                statusBadge.style.color = "var(--primary)";

            } catch (error) {
                console.error("Audio engine routing failure: ", error);
                alert("माइक्रोफोन एक्सेस की आवश्यकता है।");
            }
        } else {
            // Disconnect clean audio chain paths
            if (microphoneStreamNode) microphoneStreamNode.disconnect();
            if (highPassFilterNode) highPassFilterNode.disconnect();
            if (lowPassFilterNode) lowPassFilterNode.disconnect();
            if (dynamicCompressorNode) dynamicCompressorNode.disconnect();
            if (volumeGainNode) volumeGainNode.disconnect();
            if (rawAudioContext) {
                await rawAudioContext.close();
                rawAudioContext = null;
            }

            isPublicAddressActive = false;
            actionButton.textContent = "माइक चालू";
            actionButton.classList.remove('active');
            statusBadge.textContent = "स्थिति: बंद (Offline)";
            statusBadge.style.borderColor = "var(--border)";
            statusBadge.style.color = "#64748b";
        }
    }

    function adjustSystemLoudness(sliderValue) {
        document.getElementById('volumeDisplayValue').textContent = sliderValue + "%";
        if (rawAudioContext && volumeGainNode && isPublicAddressActive) {
            volumeGainNode.gain.setValueAtTime(sliderValue / 100, rawAudioContext.currentTime);
        }
    }
</script>
</body>
</html>
