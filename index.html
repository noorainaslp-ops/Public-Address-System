<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HearLink PA - Bluetooth Route Locked</title>
    <style>
        :root {
            --bg: #090d16;
            --card-bg: #111a2e;
            --text: #f8fafc;
            --primary: #3b82f6;
            --success: #10b981;
            --danger: #ef4444;
            --border: #1e293b;
        }
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            user-select: none;
        }
        .pa-container {
            background: var(--card-bg);
            border: 2px solid var(--border);
            border-radius: 24px;
            padding: 25px;
            width: 90%;
            max-width: 420px;
            box-sizing: border-box;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.6);
        }
        .app-title {
            font-size: 1.5rem;
            font-weight: 900;
            margin-bottom: 4px;
            color: var(--primary);
        }
        .app-subtitle {
            font-size: 0.8rem;
            color: #64748b;
            margin-bottom: 25px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .mic-btn {
            width: 100%;
            padding: 16px;
            border-radius: 14px;
            border: none;
            background: var(--danger);
            color: white;
            font-size: 1.1rem;
            font-weight: 800;
            cursor: pointer;
            outline: none;
            transition: background 0.15s;
            margin-bottom: 25px;
        }
        .mic-btn.active {
            background: var(--success);
        }
        .slider-container {
            margin: 20px 0;
            text-align: left;
        }
        .slider-label {
            display: flex;
            justify-content: space-between;
            font-weight: 700;
            font-size: 0.9rem;
            margin-bottom: 6px;
            color: #94a3b8;
        }
        .vol-slider {
            width: 100%;
            -webkit-appearance: none;
            appearance: none;
            height: 10px;
            border-radius: 5px;
            background: #090d16;
            outline: none;
            cursor: pointer;
        }
        .vol-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: var(--primary);
            cursor: pointer;
        }
        .status-badge {
            display: inline-block;
            padding: 6px 14px;
            border-radius: 20px;
            background: #090d16;
            font-size: 0.8rem;
            font-weight: 700;
            color: #64748b;
            border: 1px solid var(--border);
        }
    </style>
</head>
<body>

    <div class="pa-container">
        <div class="app-title">पब्लिक एड्रेस सिस्टम</div>
        <div class="app-subtitle">Direct Bluetooth Force Route</div>
        
        <button id="micToggleButton" class="mic-btn" onclick="togglePublicAddressEngine()">सिस्टम चालू करें</button>
        
        <div class="slider-container">
            <div class="slider-label">
                <span>आवाज़ नियंत्रण (Loudness)</span>
                <span id="volumeDisplayValue">100%</span>
            </div>
            <input type="range" id="volumeGainSlider" class="vol-slider" min="0" max="150" value="100" oninput="adjustSystemLoudness(this.value)">
        </div>
        
        <div id="statusBadgeDisplay" class="status-badge">स्थिति: बंद (Offline)</div>
    </div>

<script>
    let rawAudioContext = null;
    let microphoneStreamNode = null;
    let lowPassFilterNode = null;
    let highPassFilterNode = null;
    let dynamicCompressorNode = null;
    let volumeGainNode = null;
    let currentMediaStream = null;
    let isPublicAddressActive = false;

    async function togglePublicAddressEngine() {
        const actionButton = document.getElementById('micToggleButton');
        const statusBadge = document.getElementById('statusBadgeDisplay');

        if (!isPublicAddressActive) {
            try {
                currentMediaStream = await navigator.mediaDevices.getUserMedia({
                    audio: {
                        echoCancellation: true,
                        noiseSuppression: true,
                        autoGainControl: true
                    },
                    video: false
                });

                const AudioContextClass = window.AudioContext || window.webkitAudioContext;
                rawAudioContext = new AudioContextClass({ latencyHint: 'interactive' });

                microphoneStreamNode = rawAudioContext.createMediaStreamSource(currentMediaStream);
                highPassFilterNode = rawAudioContext.createBiquadFilter();
                lowPassFilterNode = rawAudioContext.createBiquadFilter();
                dynamicCompressorNode = rawAudioContext.createDynamicsCompressor();
                volumeGainNode = rawAudioContext.createGain();

                // Vocal Bandpass Optimization Filtering
                highPassFilterNode.type = "highpass";
                highPassFilterNode.frequency.setValueAtTime(300, rawAudioContext.currentTime);
                lowPassFilterNode.type = "lowpass";
                lowPassFilterNode.frequency.setValueAtTime(3400, rawAudioContext.currentTime);

                // Zero-Release Safety Compressor
                dynamicCompressorNode.threshold.setValueAtTime(-3, rawAudioContext.currentTime);
                dynamicCompressorNode.knee.setValueAtTime(10, rawAudioContext.currentTime);
                dynamicCompressorNode.ratio.setValueAtTime(20, rawAudioContext.currentTime);
                dynamicCompressorNode.attack.setValueAtTime(0.001, rawAudioContext.currentTime);
                dynamicCompressorNode.release.setValueAtTime(0.000, rawAudioContext.currentTime);

                const currentSliderValue = document.getElementById('volumeGainSlider').value;
                volumeGainNode.gain.setValueAtTime(currentSliderValue / 100, rawAudioContext.currentTime);

                // Connect the Audio Node Processing Graph
                microphoneStreamNode.connect(highPassFilterNode);
                highPassFilterNode.connect(lowPassFilterNode);
                lowPassFilterNode.connect(dynamicCompressorNode);
                dynamicCompressorNode.connect(volumeGainNode);
                volumeGainNode.connect(rawAudioContext.destination);

                // --- CRITICAL BLUETOOTH FORCE ROUTING LAYER ---
                // Scans the device's physical audio channels and forces output sink to Bluetooth
                if (typeof rawAudioContext.destination.setSinkId === 'function') {
                    const devices = await navigator.mediaDevices.enumerateDevices();
                    const bluetoothSpeaker = devices.find(d => 
                        d.kind === 'audiooutput' && 
                        (d.label.toLowerCase().includes('bluetooth') || d.label.toLowerCase().includes('headset') || d.label.toLowerCase().includes('hands-free'))
                    );
                    if (bluetoothSpeaker) {
                        await rawAudioContext.destination.setSinkId(bluetoothSpeaker.deviceId);
                        console.log("Output destination hardware locked to: " + bluetoothSpeaker.label);
                    }
                }

                isPublicAddressActive = true;
                actionButton.textContent = "सिस्टम बंद करें";
                actionButton.classList.add('active');
                statusBadge.textContent = "स्थिति: लाइव (BLUETOOTH TARGET ACTIVE)";
                statusBadge.style.borderColor = "var(--success)";
                statusBadge.style.color = "var(--success)";

            } catch (error) {
                console.error("Audio bridge startup failed: ", error);
                alert("माइक्रोफोन अनुमति की आवश्यकता है।");
            }
        } else {
            shutdownPAEngine();
        }
    }

    function shutdownPAEngine() {
        const actionButton = document.getElementById('micToggleButton');
        const statusBadge = document.getElementById('statusBadgeDisplay');

        if (microphoneStreamNode) microphoneStreamNode.disconnect();
        if (highPassFilterNode) highPassFilterNode.disconnect();
        if (lowPassFilterNode) lowPassFilterNode.disconnect();
        if (dynamicCompressorNode) dynamicCompressorNode.disconnect();
        if (volumeGainNode) volumeGainNode.disconnect();
        
        if (currentMediaStream) {
            currentMediaStream.getTracks().forEach(track => track.stop());
        }
        if (rawAudioContext) {
            rawAudioContext.close();
            rawAudioContext = null;
        }

        isPublicAddressActive = false;
        actionButton.textContent = "सिस्टम चालू करें";
        actionButton.classList.remove('active');
        statusBadge.textContent = "स्थिति: बंद (Offline)";
        statusBadge.style.borderColor = "var(--border)";
        statusBadge.style.color = "#64748b";
    }

    function adjustSystemLoudness(sliderValue) {
        document.getElementById('volumeDisplayValue').textContent = sliderValue + "%";
        if (rawAudioContext && volumeGainNode && isPublicAddressActive) {
            volumeGainNode.gain.setValueAtTime(sliderValue / 100, rawAudioContext.currentTime);
        }
    }
</script>
</body>
</html>
