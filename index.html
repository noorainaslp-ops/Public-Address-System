<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HearLink PA - Forced Phone Speaker Box</title>
    <style>
        :root {
            --bg: #090d16;
            --card-bg: #111a2e;
            --text: #f8fafc;
            --primary: #eab308;
            --success: #10b981;
            --danger: #ef4444;
            --border: #1e293b;
        }
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            user-select: none;
        }
        .pa-container {
            background: var(--card-bg);
            border: 2px solid var(--border);
            border-radius: 24px;
            padding: 25px;
            width: 90%;
            max-width: 400px;
            box-sizing: border-box;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.6);
        }
        .app-title {
            font-size: 1.5rem;
            font-weight: 900;
            margin-bottom: 4px;
            color: var(--primary);
        }
        .app-subtitle {
            font-size: 0.8rem;
            color: #64748b;
            margin-bottom: 25px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .mic-btn {
            width: 140px;
            height: 140px;
            border-radius: 50%;
            border: none;
            background: var(--danger);
            color: white;
            font-size: 1.1rem;
            font-weight: 800;
            cursor: pointer;
            outline: none;
            transition: all 0.2s ease;
            margin-bottom: 25px;
            box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.4);
        }
        .mic-btn.active {
            background: var(--success);
            box-shadow: 0 0 0 20px rgba(16, 185, 129, 0.15);
        }
        .status-badge {
            display: inline-block;
            padding: 6px 14px;
            border-radius: 20px;
            background: #090d16;
            font-size: 0.8rem;
            font-weight: 700;
            color: #64748b;
            border: 1px solid var(--border);
            margin-top: 15px;
        }
        .notice-text {
            font-size: 0.8rem;
            color: #94a3b8;
            margin-top: 15px;
            line-height: 1.4;
        }
    </style>
</head>
<body>

    <div class="pa-container">
        <div class="app-title">पब्लिक एड्रेस सिस्टम</div>
        <div class="app-subtitle">Forced Media Channel Output</div>
        
        <button id="micToggleButton" class="mic-btn" onclick="togglePAEngine()">सिस्टम चालू करें</button>
        
        <div id="statusBadgeDisplay" class="status-badge">स्थिति: बंद (Offline)</div>
        
        <div class="notice-text">
            नोट: यह मोड ब्लूटूथ कॉल बाईपास का उपयोग करके आवाज को सीधे आपके फोन के मुख्य लाउडस्पीकर से बाहर भेजता है।
        </div>
    </div>

<script>
    let rawAudioContext = null;
    let currentMediaStream = null;
    let audioScriptProcessor = null;
    let microphoneSourceNode = null;
    let isPAActive = false;

    async function togglePAEngine() {
        const actionButton = document.getElementById('micToggleButton');
        const statusBadge = document.getElementById('statusBadgeDisplay');

        if (!isPAActive) {
            try {
                // Request streaming parameters optimized for live speech tracking
                currentMediaStream = await navigator.mediaDevices.getUserMedia({
                    audio: {
                        echoCancellation: true,
                        noiseSuppression: true,
                        autoGainControl: true
                    },
                    video: false
                });

                const AudioContextClass = window.AudioContext || window.webkitAudioContext;
                // Force raw execution context parameters hint to match standard media play profiles
                rawAudioContext = new AudioContextClass({ latencyHint: 'playback' });

                microphoneSourceNode = rawAudioContext.createMediaStreamSource(currentMediaStream);
                
                // Construct an un-buffered direct pass-through script block mapping inside memory arrays
                audioScriptProcessor = rawAudioContext.createScriptProcessor(2048, 1, 1);

                audioScriptProcessor.onaudioprocess = function(audioProcessingEvent) {
                    const inputBufferData = audioProcessingEvent.inputBuffer.getChannelData(0);
                    const outputBufferData = audioProcessingEvent.outputBuffer.getChannelData(0);
                    
                    // Directly dump the binary floating points straight to hardware out channels
                    for (let sampleIndex = 0; sampleIndex < inputBufferData.length; sampleIndex++) {
                        outputBufferData[sampleIndex] = inputBufferData[sampleIndex];
                    }
                };

                // Connect the processing graph nodes
                microphoneSourceNode.connect(audioScriptProcessor);
                audioScriptProcessor.connect(rawAudioContext.destination);

                isPAActive = true;
                actionButton.textContent = "सिस्टम बंद करें";
                actionButton.classList.add('active');
                statusBadge.textContent = "स्थिति: लाइव (PHONE SPEAKER FORCE)";
                statusBadge.style.borderColor = "var(--success)";
                statusBadge.style.color = "var(--success)";

            } catch (error) {
                console.error("Failed to intercept hardware audio routing lines: ", error);
                alert("माइक्रोफोन अनुमति प्रदान करें।");
            }
        } else {
            shutdownPAEngine();
        }
    }

    function shutdownPAEngine() {
        const actionButton = document.getElementById('micToggleButton');
        const statusBadge = document.getElementById('statusBadgeDisplay');

        if (microphoneSourceNode) microphoneSourceNode.disconnect();
        if (audioScriptProcessor) audioScriptProcessor.disconnect();
        
        if (currentMediaStream) {
            currentMediaStream.getTracks().forEach(track => track.stop());
        }
        if (rawAudioContext) {
            rawAudioContext.close();
            rawAudioContext = null;
        }

        isPAActive = false;
        actionButton.textContent = "सिस्टम चालू करें";
        actionButton.classList.remove('active');
        statusBadge.textContent = "स्थिति: बंद (Offline)";
        statusBadge.style.borderColor = "var(--border)";
        statusBadge.style.color = "#64748b";
    }
</script>
</body>
</html>
